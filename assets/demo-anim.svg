<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Consolas,monospace" font-size="15">
  <style>
    .l { opacity: 0; }
    /* shared 10s loop, synced by percentage so it never desyncs */
    .cmd  { animation: type 10s steps(34) infinite; }
    .cur  { animation: blink 1s steps(1) infinite; }
    .o1 { animation: o1 10s linear infinite; }
    .o2 { animation: o2 10s linear infinite; }
    .o3 { animation: o3 10s linear infinite; }
    .o4 { animation: o4 10s linear infinite; }
    .sum{ animation: sum 10s ease-out infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes type { 0%{clip-path:inset(0 100% 0 0)} 12%,92%{clip-path:inset(0 0 0 0)} 100%{clip-path:inset(0 100% 0 0)} }
    @keyframes o1 { 0%,16%{opacity:0} 19%,92%{opacity:1} 100%{opacity:0} }
    @keyframes o2 { 0%,24%{opacity:0} 27%,92%{opacity:1} 100%{opacity:0} }
    @keyframes o3 { 0%,34%{opacity:0} 37%,92%{opacity:1} 100%{opacity:0} }
    @keyframes o4 { 0%,42%{opacity:0} 45%,92%{opacity:1} 100%{opacity:0} }
    @keyframes sum { 0%,54%{opacity:0} 58%,92%{opacity:1} 100%{opacity:0} }
  </style>

  <rect width="900" height="360" rx="12" fill="#0F172A" stroke="#1E293B"/>
  <rect width="900" height="36" rx="12" fill="#152136"/>
  <rect y="24" width="900" height="12" fill="#152136"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/><circle cx="40" cy="18" r="6" fill="#ffbd2e"/><circle cx="60" cy="18" r="6" fill="#22C55E"/>
  <text x="450" y="23" text-anchor="middle" fill="#94A3B8" font-size="13">skill-doctor</text>

  <!-- command (typewriter) + blinking cursor -->
  <g transform="translate(22,72)">
    <text fill="#22C55E">$ <tspan class="cmd" fill="#e2e8f0">python scripts/run.py --live</tspan></text>
    <rect class="cur" x="362" y="-13" width="9" height="17" fill="#22C55E"/>
  </g>

  <!-- output -->
  <text class="l o1" x="22" y="116" fill="#38bdf8" font-weight="bold">## Context tax (per turn)</text>
  <text class="l o2" x="22" y="142" fill="#94A3B8">  89 skills inject <tspan fill="#fbbf24" font-weight="bold">~6,832 tokens</tspan> — every request</text>

  <text class="l o3" x="22" y="184" fill="#38bdf8" font-weight="bold">## Diagnosis</text>
  <text class="l o4" x="22" y="210" fill="#94A3B8">  <tspan fill="#e2e8f0">61</tspan> never fired · <tspan fill="#e2e8f0">4</tspan> collisions · <tspan fill="#e2e8f0">0</tspan> dupes · <tspan fill="#e2e8f0">10</tspan> unused MCP servers</text>

  <!-- summary -->
  <g class="sum">
    <rect x="16" y="246" width="868" height="46" rx="8" fill="#0e2a18" stroke="#22C55E" stroke-opacity="0.45"/>
    <text x="34" y="268" fill="#22C55E" font-weight="bold" font-size="15">prescription</text>
    <text x="34" y="285" fill="#e2e8f0" font-size="13.5">disable 61 dead skills → save <tspan fill="#22C55E" font-weight="bold">~4,581 tok/turn (92%)</tspan> · fully reversible</text>
  </g>

  <text x="22" y="330" fill="#64748b" font-size="12">runs locally over ~/.claude · edits nothing without --write · zero dependencies</text>
</svg>
