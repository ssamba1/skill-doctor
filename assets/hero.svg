<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111c33"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22C55E" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="880" height="340" rx="16" fill="url(#bg)" stroke="#1E293B" stroke-width="1.5"/>

  <!-- wordmark: pulse glyph + name -->
  <g transform="translate(36,56)">
    <!-- diagnostic pulse mark -->
    <circle cx="16" cy="6" r="20" fill="none" stroke="#22C55E" stroke-width="2.5" opacity="0.35"/>
    <path d="M-2 6 H8 L12 -6 L20 16 L24 6 H34" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="14" font-size="34" font-weight="700" fill="#F8FAFC">skill-<tspan fill="#22C55E">doctor</tspan></text>
  </g>
  <text x="38" y="104" font-size="15" fill="#94A3B8">Diagnose your Claude Code skill library — cut the invisible per-turn token tax.</text>

  <!-- EKG line: healthy beats, then a flatline (the "dead" skills) -->
  <path d="M36 150 H120 L135 150 L145 124 L158 176 L168 150 H250 L262 150 L272 132 L284 168 L294 150 H360"
        fill="none" stroke="#22C55E" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M360 150 H844" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="2 5"/>
  <text x="566" y="142" font-size="11" fill="#64748b">61 skills flatlined — never fired in 75.7 days</text>
  <rect x="36" y="166" width="808" height="1" fill="url(#glow)" opacity="0.5"/>

  <!-- vital-sign stat cards -->
  <g transform="translate(36,192)">
    <rect x="0" y="0" width="256" height="112" rx="10" fill="#152136" stroke="#1E293B"/>
    <text x="20" y="34" font-size="12" fill="#94A3B8">INJECTED / TURN</text>
    <text x="20" y="78" font-size="40" font-weight="700" fill="#F8FAFC">6,832</text>
    <text x="20" y="98" font-size="11" fill="#64748b">tokens, every single request</text>
  </g>
  <g transform="translate(312,192)">
    <rect x="0" y="0" width="256" height="112" rx="10" fill="#152136" stroke="#1E293B"/>
    <text x="20" y="34" font-size="12" fill="#94A3B8">DEAD WEIGHT</text>
    <text x="20" y="78" font-size="40" font-weight="700" fill="#F8FAFC">61</text>
    <text x="20" y="98" font-size="11" fill="#64748b">skills loaded but never used</text>
  </g>
  <g transform="translate(588,192)">
    <rect x="0" y="0" width="256" height="112" rx="10" fill="#0e2a18" stroke="#22C55E" stroke-opacity="0.4"/>
    <text x="20" y="34" font-size="12" fill="#4ade80">RECLAIMABLE</text>
    <text x="20" y="78" font-size="40" font-weight="700" fill="#22C55E">92%</text>
    <text x="20" y="98" font-size="11" fill="#64748b">of the tax, reversibly</text>
  </g>
</svg>
