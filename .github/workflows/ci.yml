name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: python -m pip install --upgrade pytest coverage
      - name: Run hermetic suite with coverage gate
        run: |
          python -m coverage run -m pytest tests/ -q
          python -m coverage report --include="scripts/*" --fail-under=85
        # dogfood tests are opt-in (SKILL_DOCTOR_DOGFOOD=1) and auto-skip in CI.
